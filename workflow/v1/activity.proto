syntax = "proto3";

package utos.workflow.v1;

import "google/protobuf/duration.proto";
import "google/protobuf/struct.proto";

option csharp_namespace = "Utos.Workflow.V1";

// ============================================================================
// Activity Definitions
// ============================================================================

// Individual workflow activity definition
message WorkflowActivity {
  // Transitions to execute after successful completion
  // Evaluated in order; first matching condition wins
  // If no transitions match or list is empty, workflow completes
  repeated TransitionRule on_success = 1;

  // Transitions to execute after a failure
  // Evaluated in order; first matching condition wins
  // If no transitions match or list is empty, the error propagates
  repeated TransitionRule on_failure = 2;

  // Activity-specific configuration — exactly one must be set
  oneof config {
    HttpActivityConfig http = 10;
    WorkflowActivityConfig workflow = 11;
    PromiseActivityConfig promise = 12;
    TimerActivityConfig timer = 13;
  }
}

// Defines a conditional transition rule with an action (transition or return)
message TransitionRule {
  // Template condition expression (e.g., "{{ output.count > 10 }}")
  // If empty/omitted, rule always executes (default/fallback rule)
  // Available context: `input` (data the source activity received),
  // `output` (raw output from the source activity's execution)
  optional string condition = 1;

  // Action to take when this rule matches
  oneof action {
    // Transition to another activity
    TransitionTarget transition = 2;

    // Return data and end this execution path
    google.protobuf.Struct return = 3;
  }
}

// Defines the target of a transition
message TransitionTarget {
  // Activity name or reserved keyword ("end", "error").
  // The name may reference an already-visited activity — a back-edge — which
  // forms a loop (e.g. poll-inbox -> wait -> poll-inbox). A loop with no rule
  // transitioning to "end" (or a `return` action) runs until the execution is
  // cancelled, expressing an intentionally infinite loop such as a poller.
  string name = 1;

  // Transform that produces the target activity's `input` context.
  // Leaf string values may contain {{ }} template expressions.
  // Available context: `input` (data the source activity received),
  // `output` (raw output from the source activity's execution).
  // If omitted, the source activity's raw output passes through as-is.
  optional google.protobuf.Struct input = 2;
}

// ============================================================================
// Activity Configurations
// ============================================================================

// Configuration for HTTP activities
// String fields support {{ input.x }} template expressions to reference
// the data this activity received (workflow input for the start activity,
// or the preceding transition's transform result for subsequent activities).
message HttpActivityConfig {
  // HTTP method (e.g., "GET", "POST", "PUT", "DELETE")
  string method = 1;

  // Target URL — supports {{ input.x }} templates
  string url = 2;

  // HTTP headers — values support {{ input.x }} templates
  map<string, string> headers = 3;

  // Request body (ignored for GET/DELETE) — supports {{ input.x }} templates
  optional string body = 4;
}

// Configuration for a timer (durable delay) activity.
// Pauses this execution path for `duration`, then evaluates transitions
// normally. The activity's `input` passes through unchanged as its `output`,
// so a back-edge's TransitionTarget.input can keep threading accumulating loop
// state across the wait.
//
// Combined with a back-edge transition this expresses a polling loop, e.g.
// poll-inbox (http) -> wait (timer 60s) -> poll-inbox (back-edge).
message TimerActivityConfig {
  // How long to pause before this activity's transitions are evaluated.
  google.protobuf.Duration duration = 1;
}

// Configuration for sub-workflow invocation
message WorkflowActivityConfig {
  // Workflow reference — dependency alias or inline identifier
  string workflow = 1;

  // Activity within the sub-workflow to start execution at
  string start_activity = 2;

  // Input data passed to the sub-workflow
  // Leaf string values may contain {{ input.x }} template expressions.
  google.protobuf.Struct input = 3;
}

// Configuration for concurrent fan-out (promise) activities.
//
// Each promise activity execution is an independent concurrency scope: its
// branch outputs do not leak across invocations. Branch targets may name a
// promise or ancestor activity, so nested and looping fan-out (a branch
// transitioning back into a parent that fans out again) is permitted. Bounding
// total spawned work — concurrency, recursion depth, execution budget — is a
// daemon responsibility, not a constraint of this spec.
message PromiseActivityConfig {
  // Completion mode — operates on *started* branches (after condition filtering):
  //   "all"   — all must succeed; fails if any branch fails
  //   "any"   — resolves on first success; fails if all branches fail
  //   "race"  — resolves on first settlement (success or failure); result propagates
  //   "count" — resolves when required_count branches succeed; fails if unreachable
  string mode = 1;

  // Number of branches that must succeed — only used when mode is "count"
  int32 required_count = 2;

  // Branches to execute concurrently
  repeated PromiseBranch branches = 3;
}

// A single branch within a promise activity
// Supports static, conditional, and dynamic (for_each) branches
message PromiseBranch {
  // Key in the promise output map (e.g., "pricing")
  // Supports {{ alias.x }} templates when combined with for_each
  string name = 1;

  // Optional; expands this branch once per item in the collection
  optional ForEachConfig for_each = 2;

  // Optional; skip this branch if the condition evaluates to false
  // Per-item evaluation when combined with for_each
  optional string condition = 3;

  // Which activity to start and input mapping for this branch
  TransitionTarget target = 4;
}

// Configuration for dynamic branch expansion over a collection
message ForEachConfig {
  // Template expression that resolves to an array (e.g., "{{ input.addons }}")
  string collection = 1;

  // Variable name for the current item (e.g., "item")
  string alias = 2;
}
