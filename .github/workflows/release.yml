name: Release

# Finalizes a spec release: extracts the version from CHANGELOG.md and creates the
# git tag `v{version}`. That is the entire release — there is no package publish here.
#
# SDK repos (e.g. utos/sdk-dotnet) SUBSCRIBE to these tags and publish to their own
# package registries. This repo has no knowledge of any SDK and holds no SDK secrets.

on:
  push:
    branches: [main]

jobs:
  release:
    name: Tag release
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to create tags
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from CHANGELOG.md
        id: version
        run: |
          # Get first version line that has a date (not Unreleased)
          VERSION_LINE=$(grep -m1 '^\#\# \[.*\] - [0-9]' CHANGELOG.md || true)

          if [ -z "$VERSION_LINE" ]; then
            echo "::error::No released version found in CHANGELOG.md (version must have a date, not 'Unreleased')"
            exit 1
          fi

          VERSION=$(echo "$VERSION_LINE" | sed 's/.*\[\(.*\)\].*/\1/')
          echo "Found version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag already exists
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "::error::Tag v${{ steps.version.outputs.version }} already exists"
            exit 1
          fi

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"
